<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VersoSlides Demo</title><link rel="stylesheet" href="lib/reveal.js/dist/reset.css">
    <link rel="stylesheet" href="lib/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="lib/reveal.js/dist/theme/black.css">
    <link rel="stylesheet" href="lib/reveal.js/plugin/highlight/monokai.css">
    <link rel="stylesheet" href="lib/highlighting.css">
    <link rel="stylesheet" href="lib/tippy-border.css">
    <link rel="stylesheet" href="lib/slides-highlight.css">
    <link rel="stylesheet" href="lib/panel.css">
    <link rel="stylesheet" href="lib/lightbox.css">
    </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <section>
          <h2>
            Introduction</h2>
          <p>
            Hello, Bobkonf!!!
</p>
          </section>
        </div>
      </div>
    <script src="lib/reveal.js/dist/reveal.js"></script>
    <script src="lib/reveal.js/plugin/notes/notes.js"></script>
    <script src="lib/reveal.js/plugin/highlight/highlight.js"></script>
    <script src="lib/reveal.js/plugin/math/math.js"></script>
    <script>
      
      Reveal.initialize({
        hash: true,
        controls: true,
        progress: true,
        slideNumber: true,
        center: true,
        transition: 'slide',
        width: 960,
        height: 700,
        margin: 0.040000,
        navigationMode: 'default',
        math: { local: 'lib/katex' },
        plugins: [ RevealNotes, RevealHighlight, RevealMath.KaTeX ]
      });
    </script>
    <script src="lib/marked.min.js"></script>
    <script src="lib/popper.js"></script>
    <script src="lib/tippy.js"></script>
    <script src="lib/tippy-panel-filter.js"></script>
    <script src="lib/highlighting.js"></script>
    <script src="lib/code-block-bg.js"></script>
    <script src="lib/pretty.js"></script>
    <script src="lib/panel.js"></script>
    <script src="lib/lightbox.js"></script>
    </body>
  </html>
